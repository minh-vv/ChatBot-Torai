version: "3.9"

services:
  app:
    image: ngoquan0904/tool_use_agent:1.0
    container_name: document_extraction
    ports:
      - "8888:8888"
    environment:
      DOCUMENT_FOLDER: ${DOCUMENT_FOLDER}
      HF_TOKEN: ${HF_TOKEN}
      LLM_API: ${LLM_API}
      MINIO_BUCKET: ${MINIO_BUCKET}
      STORAGE_BUCKET: ${MINIO_BUCKET}
      MINIO_HOST: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      COLLECTION_NAME: ${COLLECTION_NAME}
      QDRANT_HOST: "qdrant"
      QDRANT_PORT: "6333"
      STOPWORD_PATH: "/app/stopwords_path.txt"
      ELASTICACHE_ENDPOINT: ${ELASTICACHE_ENDPOINT}
      ELASTICACHE_PORT: "6379"
      DIFY_API_KEY: ${DIFY_API_KEY}
      DIFY_BASE_URL: ${DIFY_BASE_URL}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL}
      OPENROUTER_URL: ${OPENROUTER_URL}
      USE_OPENROUTER: ${USE_OPENROUTER}
    volumes:
      - .:/app
      - ./Cache/stopwords_vi.txt:/app/stopwords_path.txt
    depends_on:
      - qdrant
      - minio
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["uvicorn", "main_dev:app", "--host", "0.0.0.0", "--port", "8888", "--reload"]

  qdrant:
    image: qdrant/qdrant:v1.15.1
    container_name: qdrant_db
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: quay.io/minio/minio
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  redis:
    image: redis:latest
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    container_name: django_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=True
      - SECRET_KEY=django-insecure-docker-dev-key
      - ALLOWED_HOSTS=*
      - DIFY_API_KEY=${DIFY_API_KEY}
      - DIFY_BASE_URL=${DIFY_BASE_URL}
    volumes:
      - ./backend:/app
      # Single source of truth: project root dify.py (not backend/api/dify.py)
      - ./dify.py:/app/api/dify.py
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
    container_name: vite_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
      - app

volumes:
  qdrant_data:
  minio_data:
  redis_data:

